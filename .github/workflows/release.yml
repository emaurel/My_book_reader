name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename APKs with version
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk book-reader-${{ github.ref_name }}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk book-reader-${{ github.ref_name }}-armeabi-v7a.apk
          mv app-x86_64-release.apk book-reader-${{ github.ref_name }}-x86_64.apk
          mv app-release.apk book-reader-${{ github.ref_name }}-universal.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-x86_64.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-universal.apk
          generate_release_notes: true
          body: |
            Install on Android: download `book-reader-${{ github.ref_name }}-arm64-v8a.apk` (or `-universal.apk` if unsure of your phone's architecture).

            You may need to enable "Install unknown apps" for whatever app delivered the file. Play Protect may warn about an unknown developer — tap "Install anyway".

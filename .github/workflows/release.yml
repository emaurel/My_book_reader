name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build sideload APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can compute the previous tag and
          # generate a real changelog from commits in between.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename APKs with version
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk book-reader-${{ github.ref_name }}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk book-reader-${{ github.ref_name }}-armeabi-v7a.apk
          mv app-x86_64-release.apk book-reader-${{ github.ref_name }}-x86_64.apk
          mv app-release.apk book-reader-${{ github.ref_name }}-universal.apk

      - name: Generate changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Find the most recent v* tag that comes BEFORE this one. If
          # there is no prior tag (first release ever) fall back to
          # the root commit.
          PREV=$(git tag --sort=-creatordate --list 'v*' \
            | grep -v "^${TAG}$" | head -n 1 || true)
          if [ -z "$PREV" ]; then
            RANGE_DESC="initial release"
            COMMITS=$(git log --pretty=format:'- %s' "$TAG" | head -n 50)
          else
            RANGE_DESC="changes since $PREV"
            COMMITS=$(git log --pretty=format:'- %s' "$PREV..$TAG")
          fi
          {
            echo "## What's changed"
            echo
            echo "_$RANGE_DESC_"
            echo
            echo "$COMMITS"
            echo
            echo "## Install"
            echo
            echo "**Android**: grab \`book-reader-${TAG}-arm64-v8a.apk\` (modern phones) or \`-universal.apk\` (works everywhere, larger)."
            echo "Enable 'Install unknown apps' for whatever app delivered the file. Play Protect may warn — tap **Install anyway**."
            echo
            echo "**iOS** (via AltStore): \`book-reader-${TAG}.ipa\` is auto-served from the AltStore source URL — your phone picks it up on the next refresh."
          } > RELEASE_BODY.md
          echo "----- generated body -----"
          cat RELEASE_BODY.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-x86_64.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-universal.apk
          body_path: RELEASE_BODY.md

  build-store:
    name: Build Play-Store-safe APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build store APKs (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=STORE_BUILD=true

      - name: Build store App Bundle (.aab) for Play Console
        run: |
          flutter build appbundle --release \
            --dart-define=STORE_BUILD=true

      - name: Rename store artifacts
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk \
             book-reader-${{ github.ref_name }}-store-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk \
             book-reader-${{ github.ref_name }}-store-armeabi-v7a.apk
          mv app-x86_64-release.apk \
             book-reader-${{ github.ref_name }}-store-x86_64.apk
          cd ../bundle/release
          mv app-release.aab book-reader-${{ github.ref_name }}-store.aab

      - name: Attach store artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-store-arm64-v8a.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-store-armeabi-v7a.apk
            build/app/outputs/flutter-apk/book-reader-${{ github.ref_name }}-store-x86_64.apk
            build/app/outputs/bundle/release/book-reader-${{ github.ref_name }}-store.aab

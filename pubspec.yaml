name: book_reader
description: A clean, minimal book reader for Android.
publish_to: 'none'
version: 0.3.2+5

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.0

  # Files & permissions
  file_picker: ^8.1.0
  permission_handler: ^11.3.1

  # Format readers
  epubx: ^4.0.0              # EPUB parsing (chapters + metadata + cover)
  pdfx: ^2.6.0               # PDF rendering, free
  webview_flutter: ^4.10.0   # EPUB paginated rendering via CSS columns
  
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  wakelock_plus: ^1.2.5
  kindle_unpack: ^0.1.1
  url_launcher: ^6.3.2
  flutter_inappwebview: ^6.1.5
  http: ^1.6.0
  archive: ^3.6.1
  share_plus: ^10.0.0
  graphview: ^1.2.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  # Adaptive icon (Android 8+). Reuses the same PNG; flip to a custom
  # foreground/background pair if you want the modern circle-clip look.
  adaptive_icon_background: "#1F1B2C"
  adaptive_icon_foreground: "assets/icon/icon.png"
